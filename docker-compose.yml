version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dopewis-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dopewis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dopewis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dopewis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopewis"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: dopewis-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-dopewis}:${POSTGRES_PASSWORD:-dopewis_secret}@postgres:5432/${POSTGRES_DB:-dopewis}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dopewis-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dopewis}:${POSTGRES_PASSWORD:-dopewis_secret}@postgres:5432/${POSTGRES_DB:-dopewis}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - model_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dopewis-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  mlflow_artifacts:
  model_artifacts:
